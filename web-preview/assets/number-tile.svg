<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
    <title id="title">Number tile</title>
    <desc id="desc">A bright tile with a question mark and number dots.</desc>
    <rect x="8" y="8" width="144" height="144" rx="18" fill="#ffffff" stroke="#d8dee8" stroke-width="4"/>
    <rect x="26" y="26" width="108" height="108" rx="14" fill="#0f766e"/>
    <circle cx="50" cy="50" r="8" fill="#f0a202"/>
    <circle cx="110" cy="50" r="8" fill="#f0a202"/>
    <circle cx="50" cy="110" r="8" fill="#d84c4c"/>
    <circle cx="110" cy="110" r="8" fill="#d84c4c"/>
    <text x="80" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff">?</text>
</svg>
